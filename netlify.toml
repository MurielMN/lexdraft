[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  SKIP_PREFLIGHT_CHECK = "true"
  CI = "false"

[[redirects]]
  from = "/ads.txt"
  to = "https://srv.adstxtmanager.com/19390/lexdraftvault.com"
  status = 301
  force = true

  [[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
